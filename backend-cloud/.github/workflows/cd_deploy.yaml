name: CD Cloud VM Deployment

on:
  workflow_run:
    workflows: ["CI Semantic Versioning"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to Cloud VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # If repo doesn't exist on VM, clone it. Otherwise, pull.
            if [ ! -d "~/EE471_MP4" ]; then
              git clone https://github.com/Lilbarisx/EE471_MP4.git ~/EE471_MP4
            fi
            
            cd ~/EE471_MP4
            git fetch --all
            git reset --hard origin/main
            
            cd backend-cloud
            # Run docker-compose build and restart the containers
            docker compose down
            docker compose up --build -d
            
            # Print logs to verify container is running
            docker compose ps
